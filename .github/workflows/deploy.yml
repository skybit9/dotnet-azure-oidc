# -----------------------------------------------------------------------
# deploy.yml
#
# Branch strategy:
#   dev  → push  → build + test ONLY (no deploy, acts as CI gate)
#   main → merge → build + test + deploy to Azure (CD, OIDC auth)
#
# PR from dev to main requires build job to pass (enforce in branch rules).
# Deploy job skips automatically on dev branch (if: condition).
# -----------------------------------------------------------------------
name: Build and Deploy .NET 10 App to Azure

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - 'infra/**'    # infra changes handled by infra.yml
      - '**.md'

  pull_request:
    branches: [main]  # run build+test on every PR targeting main
    paths-ignore:
      - 'infra/**'
      - '**.md'

env:
  AZURE_WEBAPP_NAME: my-dotnet-app-dev   # must match webapp_name in terraform.tfvars
  DOTNET_VERSION:    '10.0.x'
  DOTNET_BUILD_PATH: './src/MyApp.csproj'              # path to your .csproj folder

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Build + Test
  # Runs on: dev push, main push, PR to main
  # Blocks PR merge if this fails (enforce via branch protection rules)
  # -----------------------------------------------------------------------
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.DOTNET_BUILD_PATH }}

      - name: Build
        run: dotnet build ${{ env.DOTNET_BUILD_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.DOTNET_BUILD_PATH }} --configuration Release --no-build --verbosity normal
        # Tests MUST pass — no continue-on-error. Deploy job will not run if this fails.

      - name: Publish
        run: dotnet publish ${{ env.DOTNET_BUILD_PATH }} --configuration Release --no-build --output ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.DOTNET_ROOT }}/myapp
          retention-days: 1

  # -----------------------------------------------------------------------
  # Job 2: Deploy to Azure
  # Runs ONLY on push to main (not dev, not PRs).
  # Requires build job to pass first.
  # Uses OIDC — no publish profile, no static secrets.
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    # KEY GUARDRAIL: skip deploy entirely on dev branch and PRs
    # Only execute when code lands on main via merged PR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: dev          # pins OIDC subject to repo+environment:production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    permissions:
      id-token: write           # REQUIRED: allows GitHub to mint OIDC token
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./myapp

      # OIDC token exchange:
      # GitHub mints JWT → Azure AD validates subject claim
      # → issues short-lived access token (~15 min) → no secret stored
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./myapp

      - name: Azure Logout
        if: always()            # always logout even if deploy fails
        run: az logout

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.webapp-url }}"
