# -----------------------------------------------------------------------
# Workflow 1: infra.yml
# Provisions Azure infrastructure via Terraform using OIDC auth.
# Run manually (workflow_dispatch) or on changes to infra/ folder.
# -----------------------------------------------------------------------
name: Provision Infrastructure (Terraform)

on:
  workflow_dispatch:       # manual trigger
  push:
    branches: [main]
    paths:
      - 'infra/**'         # only runs when infra changes

permissions:
  id-token: write          # REQUIRED: allows GH to mint OIDC token
  contents: read

env:
  TF_VERSION: "1.7.0"
  ARM_USE_OIDC: "true"     # tells azurerm provider to use OIDC

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchange GitHub OIDC token for Azure AD access token
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"

      - name: Terraform Validate
        working-directory: ./infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./infra
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
          TF_VAR_github_org:   ${{ github.repository_owner }}
          TF_VAR_github_repo:  ${{ github.event.repository.name }}

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
